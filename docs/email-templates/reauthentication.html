<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Código de seguridad de PickHub</title>
</head>
<body style="margin:0;padding:0;background-color:#f3f4f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f3f4f6;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="padding:32px 32px 0 32px;text-align:center;">
              <h1 style="margin:0;font-size:24px;font-weight:700;color:#7c3aed;">PickHub</h1>
              <p style="margin:8px 0 0 0;font-size:14px;color:#6b7280;">Apuestas deportivas entre amigos</p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 32px;">
              <h2 style="margin:0 0 12px 0;font-size:18px;font-weight:600;color:#111827;">Código de seguridad</h2>
              <p style="margin:0 0 20px 0;font-size:14px;line-height:1.6;color:#374151;">
                Ingresa el siguiente código en PickHub para completar esta operación:
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto;background-color:#f3f4f6;border-radius:8px;border:1px solid #e5e7eb;">
                <tr>
                  <td style="padding:16px 40px;text-align:center;letter-spacing:8px;font-size:32px;font-weight:700;color:#7c3aed;font-family:monospace;">
                    {{ .Token }}
                  </td>
                </tr>
              </table>
              <p style="margin:20px 0 0 0;font-size:12px;line-height:1.5;color:#ef4444;text-align:center;">
                Este código expira en 5 minutos. Si no solicitaste este código, contacta a soporte inmediatamente.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px;background-color:#f9fafb;text-align:center;border-top:1px solid #e5e7eb;">
              <p style="margin:0;font-size:12px;color:#9ca3af;">
                &copy; 2025 PickHub. Todos los derechos reservados.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
